<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixora Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="pixora-app">

    <!-- Top Bar -->
    <header id="pixora-topbar">
      <span id="pixora-logo">Pixora Pro</span>
      <button id="pixora-btn-export" disabled>Export</button>
    </header>

    <!-- Canvas Workspace -->
    <main id="pixora-workspace">
      <div id="pixora-canvas-wrapper">
        <canvas id="pixora-canvas"></canvas>
        <div id="pixora-empty-state">
          <p>No image loaded</p>
          <button id="pixora-btn-upload-empty">Open Photo</button>
        </div>

        <!-- Crop Overlay -->
        <div id="pixora-crop-overlay">
          <div id="pixora-crop-box">
            <div class="pixora-crop-handle" data-handle="tl"></div>
            <div class="pixora-crop-handle" data-handle="tr"></div>
            <div class="pixora-crop-handle" data-handle="bl"></div>
            <div class="pixora-crop-handle" data-handle="br"></div>
          </div>
        </div>

        <!-- Crop Action Bar -->
        <div id="pixora-crop-actions" class="pixora-hidden">
          <button id="pixora-btn-crop-cancel">Cancel</button>
          <button id="pixora-btn-crop-confirm">Apply Crop</button>
        </div>
      </div>
    </main>

    <!-- Filter Panel -->
    <div id="pixora-filter-panel" class="pixora-hidden">

      <div class="pixora-filter-row">
        <label for="pixora-filter-slider-brightness">Brightness</label>
        <input type="range" id="pixora-filter-slider-brightness" min="0" max="200" value="100">
      </div>

      <div class="pixora-filter-row">
        <label for="pixora-filter-slider-contrast">Contrast</label>
        <input type="range" id="pixora-filter-slider-contrast" min="0" max="200" value="100">
      </div>

      <div class="pixora-filter-row">
        <label for="pixora-filter-slider-saturation">Saturation</label>
        <input type="range" id="pixora-filter-slider-saturation" min="0" max="200" value="100">
      </div>

      <div id="pixora-filter-presets">
        <button id="pixora-filter-preset-original" class="pixora-preset-btn">Original</button>
        <button id="pixora-filter-preset-grayscale" class="pixora-preset-btn">Grayscale</button>
        <button id="pixora-filter-preset-sepia" class="pixora-preset-btn">Sepia</button>
        <button id="pixora-filter-preset-invert" class="pixora-preset-btn">Invert</button>
      </div>

      <div id="pixora-filter-actions">
        <button id="pixora-btn-filter-cancel">Cancel</button>
        <button id="pixora-btn-filter-confirm">Apply</button>
      </div>

    </div>

    <!-- Bottom Toolbar (Zoom buttons removed — pinch-to-zoom used instead) -->
    <footer id="pixora-toolbar">
      <button id="pixora-btn-upload" class="pixora-tool-btn">Import</button>
      <button id="pixora-btn-rotate-left" class="pixora-tool-btn" disabled>Rotate L</button>
      <button id="pixora-btn-rotate-right" class="pixora-tool-btn" disabled>Rotate R</button>
      <button id="pixora-btn-crop" class="pixora-tool-btn" disabled>Crop</button>
      <button id="pixora-btn-filters" class="pixora-tool-btn" disabled>Filters</button>
      <button id="pixora-btn-reset" class="pixora-tool-btn" disabled>Reset</button>
    </footer>

    <input type="file" id="pixora-file-input" accept="image/*" hidden>

  </div>

  <script src="script.js"></script>
</body>
  </html>
