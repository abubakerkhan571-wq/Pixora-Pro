<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixora Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="pixora-app">

    <!-- Top Bar -->
    <header id="pixora-topbar">
      <span id="pixora-logo">Pixora Pro</span>
      <button id="pixora-btn-export" disabled>Export</button>
    </header>

    <!-- Canvas Workspace -->
    <main id="pixora-workspace">
      <div id="pixora-canvas-wrapper">
        <canvas id="pixora-canvas"></canvas>
        <div id="pixora-empty-state">
          <p>No image loaded</p>
          <button id="pixora-btn-upload-empty">Open Photo</button>
        </div>
      </div>
    </main>

    <!-- Bottom Toolbar -->
    <footer id="pixora-toolbar">
      <button id="pixora-btn-upload" class="pixora-tool-btn">Import</button>
      <button id="pixora-btn-zoom-in" class="pixora-tool-btn" disabled>Zoom +</button>
      <button id="pixora-btn-zoom-out" class="pixora-tool-btn" disabled>Zoom -</button>
      <button id="pixora-btn-reset" class="pixora-tool-btn" disabled>Reset</button>
    </footer>

    <input type="file" id="pixora-file-input" accept="image/*" hidden>

  </div>

  <script src="app.js"></script>
</body>
      </html>
