<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pixora Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Splash Screen -->

<section id="splashScreen">

<div class="logoBox">

<h1>Pixora Pro</h1>

<p>Professional Photo Editor</p>

</div>

</section>

<!-- Login Screen -->

<section id="loginScreen">

<h2>Welcome</h2>

<p>Continue to Pixora Pro</p>

<button id="guestLoginBtn">

Continue as Guest

</button>

</section>

<!-- Home Screen -->

<section id="homeScreen">

<header>

<h2>Pixora Pro</h2>

</header>

<div class="homeGrid">

<div
id="photoEditorCard"
class="homeCard">

Photo Editor

</div>

<div
class="homeCard">

Logo Maker

</div>

<div
class="homeCard">

Banner Maker

</div>

</div>

</section>

<!-- Editor -->

<section id="editorScreen">

<header class="editorTopBar">

<button id="backBtn">

←

</button>

<h2>Editor</h2>

<button id="saveBtn">

Save

</button>

</header>

<main id="editorCanvas">

<input
type="file"
id="imagePicker"
accept="image/*"
hidden>

<img
id="editorImage"
alt="">

</main>

<nav class="editorBottomBar">

<button id="toolGallery">

Gallery

</button>

<button id="toolText">

Text

</button>

<button id="toolFilter">

Filter

</button>

<button id="toolEffects">

Effects

</button>

</nav>

</section>

<script src="script.js"></script>

</body>

</html>
